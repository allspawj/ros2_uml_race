name: ros2-ci
on: [push, pull_request]
jobs:
  build:
    runs-on: [self-hosted, ros2]
    steps:
      - uses: actions/checkout@v4

      - name: Resolve dependencies
        run: |
          source /opt/ros/humble/setup.bash
          rosdep update
          rosdep install --from-paths . --ignore-src -y      

      - name: Build
        run: |
          source /opt/ros/humble/setup.bash
          colcon build

          #      - name: Test
          #        run: |
          #          source /opt/ros/humble/setup.bash
          #          colcon test
          #          colcon test-result --verbose    
